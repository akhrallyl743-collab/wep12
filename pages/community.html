<!-- ============ المجتمع ============ -->
<div id="page-community" class="page" role="main">
  <div class="community-wrap">
    <div class="community-header">
      <h1>🌍 مجتمع خط البداية</h1>
      <p>شارك تجربتك، اطرح سؤالك، وادعم رحلة غيرك</p>
    </div>
    <div class="new-post-box">
      <div class="post-composer">
        <div class="avatar" id="post-avatar" style="background:var(--g100);color:var(--g600);">👤</div>
        <textarea id="new-post-text" placeholder="شارك فكرة، سؤال، أو إنجاز...&#10;استخدم # للوسوم مثل: #تصميم #برمجة" rows="3" maxlength="1000" aria-label="محتوى المنشور"></textarea>
      </div>
      <div class="post-actions">
        <div class="post-tags" role="group" aria-label="وسوم جاهزة">
          <button class="post-tag-btn" data-action="addPostTag" data-tag="#سؤال">#سؤال</button>
          <button class="post-tag-btn" data-action="addPostTag" data-tag="#إنجاز">#إنجاز</button>
          <button class="post-tag-btn" data-action="addPostTag" data-tag="#نصيحة">#نصيحة</button>
          <button class="post-tag-btn" data-action="addPostTag" data-tag="#تصميم">#تصميم</button>
          <button class="post-tag-btn" data-action="addPostTag" data-tag="#برمجة">#برمجة</button>
        </div>
        <button class="post-btn" data-action="addPost">نشر ✨</button>
      </div>
    </div>
    <div class="feed" id="community-feed" aria-live="polite" aria-label="منشورات المجتمع">
      <div style="text-align:center;padding:40px;color:var(--muted);">
        <div class="spinner" style="margin:0 auto 10px;"></div>
        <p style="font-size:14px;">جاري تحميل المنشورات...</p>
      </div>
    </div>
  </div>
</div>
