<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0818"/>
      <stop offset="100%" style="stop-color:#0d0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f35e8"/>
      <stop offset="100%" style="stop-color:#1fbb85"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow circles -->
  <circle cx="200" cy="315" r="300" fill="rgba(79,53,232,0.12)"/>
  <circle cx="1000" cy="315" r="280" fill="rgba(31,187,133,0.08)"/>
  <!-- Brand line -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>
  <!-- Logo box -->
  <rect x="80" y="240" width="80" height="80" rx="20" fill="url(#accent)"/>
  <text x="120" y="296" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle">SL</text>
  <!-- Main title -->
  <text x="185" y="270" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white">START LINE</text>
  <text x="185" y="310" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">خط البداية</text>
  <!-- Tagline -->
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.85)">منصة التوجيه المهني الأولى للشباب العربي</text>
  <!-- Features -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">✦ اختبار مهني ذكي   ✦ مسارات مخصصة   ✦ مجتمع داعم   ✦ مجاناً تماماً</text>
  <!-- URL -->
  <text x="80" y="570" font-family="Arial, sans-serif" font-size="18" fill="rgba(124,109,255,0.9)">start-line.vercel.app</text>
</svg>
