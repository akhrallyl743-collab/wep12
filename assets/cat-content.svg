<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#130008"/>
      <stop offset="55%" style="stop-color:#220010"/>
      <stop offset="100%" style="stop-color:#1a0018"/>
    </linearGradient>
    <radialGradient id="orb1" cx="70%" cy="25%" r="55%">
      <stop offset="0%" style="stop-color:#b91c6d;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#b91c6d;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="15%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#e84393;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e84393;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b91c6d"/>
      <stop offset="100%" style="stop-color:#e84393"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#orb1)"/>
  <rect width="800" height="500" fill="url(#orb2)"/>

  <!-- Background waves -->
  <g opacity="0.06" stroke="#e84393" fill="none" stroke-width="1.5">
    <path d="M0,100 Q200,60 400,100 Q600,140 800,100"/>
    <path d="M0,180 Q200,140 400,180 Q600,220 800,180"/>
    <path d="M0,260 Q200,220 400,260 Q600,300 800,260"/>
    <path d="M0,340 Q200,300 400,340 Q600,380 800,340"/>
    <path d="M0,420 Q200,380 400,420 Q600,460 800,420"/>
  </g>

  <!-- Phone mockup - main element -->
