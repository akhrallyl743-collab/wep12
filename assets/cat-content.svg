  <text x="98" y="118" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">م</text>
  <rect x="112" y="108" width="70" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>
  <rect x="112" y="118" width="45" height="5" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="80" y="130" width="170" height="40" rx="4" fill="rgba(185,28,109,0.1)"/>
  <text x="165" y="157" font-family="sans-serif" font-size="28" text-anchor="middle">🎨</text>
  <g font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">
    <text x="88" y="186">❤️ 1.2k</text><text x="138" y="186">💬 48</text><text x="183" y="186">🔁 234</text>
