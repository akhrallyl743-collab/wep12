      <rect x="54" y="-8" width="5" height="16" rx="2" opacity="0.7"/>
      <rect x="63" y="-18" width="5" height="36" rx="2" opacity="0.85"/>
      <rect x="72" y="-12" width="5" height="24" rx="2" opacity="0.75"/>
      <rect x="81" y="-22" width="5" height="44" rx="2" opacity="0.88"/>
      <rect x="90" y="-5" width="5" height="10" rx="2" opacity="0.6"/>
      <rect x="99" y="-28" width="5" height="56" rx="2"/>
      <rect x="108" y="-15" width="5" height="30" rx="2" opacity="0.8"/>
      <rect x="117" y="-10" width="5" height="20" rx="2" opacity="0.7"/>
      <rect x="126" y="-20" width="5" height="40" rx="2" opacity="0.85"/>
      <rect x="135" y="-6" width="5" height="12" rx="2" opacity="0.65"/>
      <rect x="144" y="-16" width="5" height="32" rx="2" opacity="0.78"/>
      <rect x="153" y="-24" width="5" height="48" rx="2" opacity="0.9"/>
      <rect x="162" y="-8" width="5" height="16" rx="2" opacity="0.68"/>
      <rect x="171" y="-14" width="5" height="28" rx="2" opacity="0.75"/>
