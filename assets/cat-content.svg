    <text x="657" y="217" font-family="sans-serif" font-size="11" font-weight="700" fill="rgba(255,80,80,0.9)">YouTube</text>
    <text x="657" y="228" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">52K مشترك</text>

