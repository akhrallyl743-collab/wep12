  <rect x="120" y="55" width="90" height="24" rx="12" fill="rgba(0,0,0,0.9)"/>
  <circle cx="165" cy="67" r="5" fill="rgba(30,30,30,1)"/>
  <!-- Screen -->
  <rect x="72" y="90" width="186" height="310" rx="8" fill="rgba(10,0,5,0.7)"/>

