<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0900"/>
      <stop offset="55%" style="stop-color:#1c1400"/>
      <stop offset="100%" style="stop-color:#120c00"/>
    </linearGradient>
    <radialGradient id="orb1" cx="70%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#c07a08;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#c07a08;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="15%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#e8a81a;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#e8a81a;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c07a08"/>
      <stop offset="100%" style="stop-color:#e8a81a"/>
    </linearGradient>
    <linearGradient id="bar-up" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a81a;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#c07a08;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#orb1)"/>
  <rect width="800" height="500" fill="url(#orb2)"/>

  <!-- Diagonal line pattern -->
  <g opacity="0.04" stroke="#e8a81a" stroke-width="1">
    <line x1="0" y1="100" x2="200" y2="0"/><line x1="0" y1="200" x2="400" y2="0"/>
    <line x1="0" y1="300" x2="600" y2="0"/><line x1="0" y1="400" x2="800" y2="0"/>
    <line x1="0" y1="500" x2="800" y2="100"/><line x1="200" y1="500" x2="800" y2="300"/>
    <line x1="400" y1="500" x2="800" y2="400"/><line x1="600" y1="500" x2="800" y2="500"/>
  </g>

  <!-- Main dashboard card -->
  <rect x="55" y="55" width="445" height="370" rx="16" fill="rgba(14,9,0,0.88)" stroke="rgba(192,122,8,0.45)" stroke-width="1.5"/>
  <rect x="55" y="55" width="445" height="38" rx="16" fill="rgba(192,122,8,0.2)"/>
  <rect x="55" y="75" width="445" height="18" fill="rgba(192,122,8,0.1)"/>
  <text x="278" y="79" font-family="sans-serif" font-size="10" fill="rgba(255,200,80,0.6)" text-anchor="middle" font-weight="600">📊 Business Dashboard</text>

  <!-- KPI cards row -->
  <rect x="68" y="105" width="100" height="65" rx="10" fill="rgba(232,168,26,0.1)" stroke="rgba(232,168,26,0.3)" stroke-width="1"/>
  <text x="118" y="122" font-family="sans-serif" font-size="9" fill="rgba(255,200,80,0.5)" text-anchor="middle">الإيرادات</text>
  <text x="118" y="143" font-family="sans-serif" font-size="18" font-weight="800" fill="#e8a81a" text-anchor="middle">$48k</text>
  <text x="118" y="160" font-family="sans-serif" font-size="9" fill="#1fbb85" text-anchor="middle">↑ +22%</text>

  <rect x="178" y="105" width="100" height="65" rx="10" fill="rgba(31,187,133,0.08)" stroke="rgba(31,187,133,0.25)" stroke-width="1"/>
  <text x="228" y="122" font-family="sans-serif" font-size="9" fill="rgba(31,187,133,0.6)" text-anchor="middle">العملاء</text>
  <text x="228" y="143" font-family="sans-serif" font-size="18" font-weight="800" fill="#1fbb85" text-anchor="middle">1.2k</text>
  <text x="228" y="160" font-family="sans-serif" font-size="9" fill="#1fbb85" text-anchor="middle">↑ +18%</text>

  <rect x="288" y="105" width="100" height="65" rx="10" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="338" y="122" font-family="sans-serif" font-size="9" fill="rgba(56,189,248,0.6)" text-anchor="middle">التحويل</text>
  <text x="338" y="143" font-family="sans-serif" font-size="18" font-weight="800" fill="#38bdf8" text-anchor="middle">8.4%</text>
  <text x="338" y="160" font-family="sans-serif" font-size="9" fill="#1fbb85" text-anchor="middle">↑ +3.1%</text>

  <rect x="398" y="105" width="90" height="65" rx="10" fill="rgba(192,122,8,0.12)" stroke="rgba(232,168,26,0.3)" stroke-width="1"/>
  <text x="443" y="122" font-family="sans-serif" font-size="9" fill="rgba(255,200,80,0.5)" text-anchor="middle">الربح</text>
  <text x="443" y="143" font-family="sans-serif" font-size="18" font-weight="800" fill="#e8a81a" text-anchor="middle">$18k</text>
  <text x="443" y="160" font-family="sans-serif" font-size="9" fill="#1fbb85" text-anchor="middle">↑ +31%</text>

  <!-- Chart area -->
  <rect x="68" y="182" width="420" height="165" rx="10" fill="rgba(0,0,0,0.3)" stroke="rgba(192,122,8,0.2)" stroke-width="1"/>
  <text x="80" y="198" font-family="sans-serif" font-size="9" fill="rgba(255,200,80,0.4)">الإيرادات الشهرية — 2024</text>

  <!-- Chart grid lines -->
  <g stroke="rgba(232,168,26,0.1)" stroke-width="1">
    <line x1="68" y1="215" x2="488" y2="215"/>
    <line x1="68" y1="232" x2="488" y2="232"/>
    <line x1="68" y1="249" x2="488" y2="249"/>
    <line x1="68" y1="266" x2="488" y2="266"/>
    <line x1="68" y1="283" x2="488" y2="283"/>
    <line x1="68" y1="300" x2="488" y2="300"/>
    <line x1="68" y1="317" x2="488" y2="317"/>
    <line x1="68" y1="335" x2="488" y2="335"/>
  </g>

  <!-- Bar chart bars -->
  <g filter="url(#glow)">
    <rect x="88" y="305" width="22" height="30" rx="4" fill="url(#bar-up)" opacity="0.7"/>
    <rect x="118" y="290" width="22" height="45" rx="4" fill="url(#bar-up)" opacity="0.75"/>
    <rect x="148" y="278" width="22" height="57" rx="4" fill="url(#bar-up)" opacity="0.8"/>
    <rect x="178" y="268" width="22" height="67" rx="4" fill="url(#bar-up)" opacity="0.82"/>
    <rect x="208" y="259" width="22" height="76" rx="4" fill="url(#bar-up)" opacity="0.85"/>
    <rect x="238" y="245" width="22" height="90" rx="4" fill="url(#bar-up)" opacity="0.88"/>
    <rect x="268" y="238" width="22" height="97" rx="4" fill="url(#bar-up)" opacity="0.9"/>
    <rect x="298" y="226" width="22" height="109" rx="4" fill="url(#bar-up)"/>
    <rect x="328" y="215" width="22" height="120" rx="4" fill="url(#bar-up)"/>
    <rect x="358" y="206" width="22" height="129" rx="4" fill="#e8a81a"/>
    <rect x="388" y="218" width="22" height="117" rx="4" fill="#e8a81a" opacity="0.9"/>
    <rect x="418" y="200" width="22" height="135" rx="4" fill="#e8a81a"/>
    <!-- Highlight on last bar -->
    <rect x="448" y="190" width="22" height="145" rx="4" fill="#ffd93d"/>
    <text x="459" y="186" font-family="sans-serif" font-size="8" fill="#ffd93d" text-anchor="middle" font-weight="700">+45%</text>
  </g>

  <!-- Trend line -->
  <polyline points="99,305 129,285 159,272 189,263 219,250 249,240 279,232 309,220 339,210 369,200 399,212 429,196 459,185" 
    fill="none" stroke="rgba(31,187,133,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="459" cy="185" r="5" fill="#1fbb85"/>

  <!-- Month labels -->
  <g font-family="sans-serif" font-size="7" fill="rgba(255,200,80,0.4)" text-anchor="middle">
    <text x="99" y="350">يناير</text><text x="129" y="350">فبراير</text><text x="159" y="350">مارس</text>
    <text x="189" y="350">أبريل</text><text x="219" y="350">مايو</text><text x="249" y="350">يونيو</text>
    <text x="279" y="350">يوليو</text><text x="309" y="350">أغسطس</text><text x="339" y="350">سبتمبر</text>
    <text x="369" y="350">أكتوبر</text><text x="399" y="350">نوفمبر</text><text x="429" y="350">ديسمبر</text>
    <text x="459" y="350" fill="#ffd93d" font-weight="700">يناير ↑</text>
  </g>

  <!-- Right side elements -->
  <g filter="url(#glow)">
    <!-- Pie chart -->
    <circle cx="660" cy="160" r="70" fill="none" stroke="rgba(232,168,26,0.6)" stroke-width="30" stroke-dasharray="110 440"/>
    <circle cx="660" cy="160" r="70" fill="none" stroke="rgba(31,187,133,0.55)" stroke-width="30" stroke-dasharray="88 440" stroke-dashoffset="-110"/>
    <circle cx="660" cy="160" r="70" fill="none" stroke="rgba(56,189,248,0.5)" stroke-width="30" stroke-dasharray="66 440" stroke-dashoffset="-198"/>
    <circle cx="660" cy="160" r="70" fill="none" stroke="rgba(199,125,255,0.45)" stroke-width="30" stroke-dasharray="44 440" stroke-dashoffset="-264"/>
    <circle cx="660" cy="160" r="70" fill="none" stroke="rgba(255,107,107,0.4)" stroke-width="30" stroke-dasharray="132 440" stroke-dashoffset="-308"/>
    <circle cx="660" cy="160" r="45" fill="rgba(14,9,0,0.9)"/>
    <text x="660" y="155" font-family="sans-serif" font-size="11" fill="rgba(255,200,80,0.6)" text-anchor="middle">Market</text>
    <text x="660" y="170" font-family="sans-serif" font-size="11" fill="rgba(255,200,80,0.6)" text-anchor="middle">Share</text>

    <!-- Legend -->
    <g font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.55)">
      <rect x="600" y="250" width="10" height="10" rx="2" fill="#e8a81a" opacity="0.8"/>
      <text x="616" y="260">تجارة إلكترونية</text>
      <rect x="600" y="268" width="10" height="10" rx="2" fill="#1fbb85" opacity="0.8"/>
      <text x="616" y="278">فريلانس</text>
      <rect x="600" y="286" width="10" height="10" rx="2" fill="#38bdf8" opacity="0.8"/>
      <text x="616" y="296">استشارات</text>
      <rect x="600" y="304" width="10" height="10" rx="2" fill="#c77dff" opacity="0.8"/>
      <text x="616" y="314">تسويق</text>
    </g>

    <!-- Briefcase icon -->
    <g transform="translate(625,345)" opacity="0.35" fill="none" stroke="#e8a81a" stroke-width="2.5">
      <rect x="5" y="15" width="60" height="45" rx="5"/>
      <path d="M20 15 v-8 a6 6 0 0 1 6-6 h18 a6 6 0 0 1 6 6 v8"/>
      <line x1="0" y1="35" x2="70" y2="35"/>
      <line x1="30" y1="28" x2="40" y2="28"/>
    </g>
  </g>

  <!-- Bottom accent -->
  <rect x="55" y="447" width="445" height="3" rx="1.5" fill="url(#accent)" opacity="0.65"/>
</svg>