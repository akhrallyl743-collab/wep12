<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08001a"/>
      <stop offset="55%" style="stop-color:#120028"/>
      <stop offset="100%" style="stop-color:#0e0020"/>
    </linearGradient>
    <radialGradient id="orb1" cx="70%" cy="28%" r="52%">
      <stop offset="0%" style="stop-color:#7e22ce;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="18%" cy="78%" r="42%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7e22ce"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#orb1)"/>
  <rect width="800" height="500" fill="url(#orb2)"/>

  <!-- Stars background -->
  <g fill="white" opacity="0.4">
    <circle cx="45" cy="35" r="1"/><circle cx="120" cy="80" r="1.2"/><circle cx="200" cy="25" r="0.8"/>
    <circle cx="310" cy="60" r="1"/><circle cx="380" cy="20" r="1.3"/><circle cx="450" cy="75" r="0.9"/>
    <circle cx="530" cy="30" r="1.1"/><circle cx="620" cy="55" r="0.8"/><circle cx="700" cy="25" r="1.2"/>
    <circle cx="760" cy="70" r="1"/><circle cx="85" cy="110" r="0.9"/><circle cx="165" cy="140" r="1.1"/>
    <circle cx="260" cy="100" r="0.8"/><circle cx="340" cy="130" r="1"/><circle cx="490" cy="115" r="1.2"/>
    <circle cx="580" cy="95" r="0.9"/><circle cx="660" cy="120" r="1.1"/><circle cx="740" cy="100" r="0.8"/>
    <circle cx="55" cy="200" r="1"/><circle cx="140" cy="230" r="0.9"/><circle cx="750" cy="220" r="1"/>
    <circle cx="770" cy="350" r="1.1"/><circle cx="40" cy="380" r="0.9"/><circle cx="780" cy="430" r="1"/>
  </g>

  <!-- Open book - main left element -->
  <g filter="url(#glow)">
    <!-- Book spine -->
    <rect x="220" y="100" width="8" height="200" rx="4" fill="rgba(126,34,206,0.6)"/>

    <!-- Left page -->
    <path d="M55,100 Q138,96 220,100 L220,300 Q138,304 55,300 Z" fill="rgba(18,0,40,0.85)" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
    <!-- Left page lines -->
    <g opacity="0.4">
      <line x1="75" y1="130" x2="205" y2="130" stroke="rgba(192,132,252,0.5)" stroke-width="1"/>
      <line x1="75" y1="148" x2="205" y2="148" stroke="rgba(192,132,252,0.35)" stroke-width="1"/>
      <line x1="75" y1="166" x2="205" y2="166" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
      <line x1="75" y1="184" x2="180" y2="184" stroke="rgba(192,132,252,0.25)" stroke-width="1"/>
      <line x1="75" y1="202" x2="205" y2="202" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
      <line x1="75" y1="220" x2="165" y2="220" stroke="rgba(192,132,252,0.25)" stroke-width="1"/>
      <line x1="75" y1="238" x2="205" y2="238" stroke="rgba(192,132,252,0.28)" stroke-width="1"/>
      <line x1="75" y1="256" x2="190" y2="256" stroke="rgba(192,132,252,0.22)" stroke-width="1"/>
      <line x1="75" y1="274" x2="205" y2="274" stroke="rgba(192,132,252,0.25)" stroke-width="1"/>
    </g>
    <!-- Left page content -->
    <text x="130" y="120" font-family="serif" font-size="11" fill="rgba(192,132,252,0.7)" text-anchor="middle" font-weight="700">أسس البحث العلمي</text>
    <text x="75" y="145" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.5)">الفصل الأول: المنهجية</text>
    <text x="75" y="163" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.35)">  ١. تحديد مشكلة البحث</text>
    <text x="75" y="178" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.32)">  ٢. مراجعة الأدبيات</text>
    <text x="75" y="193" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.3)">  ٣. الفرضية العلمية</text>
    <text x="75" y="215" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.45)">الفصل الثاني: جمع البيانات</text>
    <text x="75" y="232" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.3)">  أساليب الاستبيان...</text>
    <text x="75" y="247" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.28)">  المقابلات والملاحظة...</text>
    <!-- Page number -->
    <text x="130" y="290" font-family="serif" font-size="9" fill="rgba(192,132,252,0.4)" text-anchor="middle">٤٢</text>

    <!-- Right page -->
    <path d="M228,100 Q310,96 395,100 L395,300 Q310,304 228,300 Z" fill="rgba(20,0,45,0.85)" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
    <!-- Right page - chart/graph -->
    <text x="312" y="120" font-family="serif" font-size="10" fill="rgba(192,132,252,0.65)" text-anchor="middle" font-weight="700">نتائج الدراسة</text>

    <!-- Mini bar chart on right page -->
    <g opacity="0.7">
      <rect x="245" y="220" width="18" height="60" rx="3" fill="rgba(126,34,206,0.5)" stroke="rgba(192,132,252,0.4)" stroke-width="1"/>
      <rect x="272" y="200" width="18" height="80" rx="3" fill="rgba(126,34,206,0.6)" stroke="rgba(192,132,252,0.4)" stroke-width="1"/>
      <rect x="299" y="185" width="18" height="95" rx="3" fill="rgba(126,34,206,0.7)" stroke="rgba(192,132,252,0.45)" stroke-width="1"/>
      <rect x="326" y="175" width="18" height="105" rx="3" fill="rgba(192,132,252,0.7)" stroke="rgba(192,132,252,0.5)" stroke-width="1"/>
      <rect x="353" y="165" width="18" height="115" rx="3" fill="#c084fc" stroke="rgba(192,132,252,0.6)" stroke-width="1"/>
      <line x1="238" y1="280" x2="380" y2="280" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
    </g>
    <!-- Scatter plot points -->
    <g fill="#c084fc" opacity="0.6">
      <circle cx="248" cy="155" r="3"/><circle cx="262" cy="148" r="3"/><circle cx="276" cy="152" r="3"/>
      <circle cx="290" cy="142" r="3"/><circle cx="304" cy="145" r="3"/><circle cx="318" cy="138" r="3"/>
      <circle cx="332" cy="140" r="3"/><circle cx="346" cy="132" r="3"/><circle cx="360" cy="134" r="3"/>
      <circle cx="374" cy="128" r="3"/>
    </g>
    <polyline points="248,155 262,148 276,152 290,142 304,145 318,138 332,140 346,132 360,134 374,128" fill="none" stroke="rgba(192,132,252,0.5)" stroke-width="1.5"/>
    <text x="312" y="292" font-family="serif" font-size="9" fill="rgba(192,132,252,0.4)" text-anchor="middle">٤٣</text>
  </g>

  <!-- Graduation cap floating -->
  <g transform="translate(440,65)" filter="url(#glow2)" opacity="0.8">
    <rect x="0" y="25" width="80" height="12" rx="3" fill="rgba(126,34,206,0.8)" stroke="rgba(192,132,252,0.6)" stroke-width="1.5"/>
    <polygon points="40,0 80,25 40,32 0,25" fill="rgba(126,34,206,0.7)" stroke="rgba(192,132,252,0.5)" stroke-width="1.5"/>
    <line x1="40" y1="32" x2="40" y2="55" stroke="rgba(192,132,252,0.5)" stroke-width="2"/>
    <circle cx="40" cy="58" r="5" fill="rgba(192,132,252,0.7)"/>
    <line x1="80" y1="25" x2="100" y2="45" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>
    <circle cx="103" cy="48" r="4" fill="rgba(192,132,252,0.5)">
      <animate attributeName="cy" values="48;44;48" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Knowledge graph / mind map -->
  <g filter="url(#glow)">
    <!-- Central node -->
    <circle cx="620" cy="240" r="38" fill="rgba(126,34,206,0.35)" stroke="rgba(192,132,252,0.6)" stroke-width="2"/>
    <text x="620" y="237" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle" font-weight="700">المعرفة</text>
    <text x="620" y="251" font-family="sans-serif" font-size="9" fill="rgba(192,132,252,0.7)" text-anchor="middle">العلمية</text>

    <!-- Connecting lines -->
    <line x1="582" y1="218" x2="530" y2="185" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>
    <line x1="582" y1="262" x2="528" y2="295" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>
    <line x1="658" y1="215" x2="710" y2="180" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>
    <line x1="658" y1="265" x2="712" y2="305" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>
    <line x1="620" y1="202" x2="620" y2="140" stroke="rgba(192,132,252,0.3)" stroke-width="1.5"/>
    <line x1="620" y1="278" x2="620" y2="340" stroke="rgba(192,132,252,0.3)" stroke-width="1.5"/>

    <!-- Satellite nodes -->
    <circle cx="512" cy="175" r="25" fill="rgba(126,34,206,0.25)" stroke="rgba(192,132,252,0.45)" stroke-width="1.5"/>
    <text x="512" y="172" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.65)" text-anchor="middle">بحث</text>
    <text x="512" y="183" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.65)" text-anchor="middle">علمي</text>

    <circle cx="516" cy="305" r="25" fill="rgba(126,34,206,0.22)" stroke="rgba(192,132,252,0.4)" stroke-width="1.5"/>
    <text x="516" y="302" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="middle">كتابة</text>
    <text x="516" y="313" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="middle">أكاديمية</text>

    <circle cx="722" cy="172" r="25" fill="rgba(126,34,206,0.22)" stroke="rgba(192,132,252,0.4)" stroke-width="1.5"/>
    <text x="722" y="169" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="middle">تدريس</text>
    <text x="722" y="180" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.6)" text-anchor="middle">أونلاين</text>

    <circle cx="726" cy="313" r="25" fill="rgba(126,34,206,0.2)" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>
    <text x="726" y="310" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.55)" text-anchor="middle">إرشاد</text>
    <text x="726" y="321" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.55)" text-anchor="middle">قانوني</text>

    <circle cx="620" cy="122" r="22" fill="rgba(126,34,206,0.2)" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>
    <text x="620" y="119" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)" text-anchor="middle">طب</text>
    <text x="620" y="130" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.6)" text-anchor="middle">طبيعي</text>

    <circle cx="620" cy="358" r="22" fill="rgba(126,34,206,0.18)" stroke="rgba(192,132,252,0.3)" stroke-width="1.5"/>
    <text x="620" y="362" font-family="sans-serif" font-size="7.5" fill="rgba(255,255,255,0.5)" text-anchor="middle">قانون</text>
  </g>

  <!-- Achievement badges bottom left -->
  <g filter="url(#glow)">
    <rect x="55" y="330" width="360" height="100" rx="14" fill="rgba(8,0,26,0.85)" stroke="rgba(126,34,206,0.35)" stroke-width="1.5"/>
    <text x="72" y="350" font-family="sans-serif" font-size="9" fill="rgba(192,132,252,0.55)">🏆 الإنجازات الأكاديمية</text>

    <g font-family="sans-serif" font-size="10">
      <rect x="70" y="360" width="70" height="56" rx="10" fill="rgba(126,34,206,0.2)" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
      <text x="105" y="385" font-size="20" text-anchor="middle">🎓</text>
      <text x="105" y="402" font-size="7.5" fill="rgba(255,255,255,0.5)" text-anchor="middle">شهادة</text>
      <text x="105" y="412" font-size="7.5" fill="rgba(255,255,255,0.5)" text-anchor="middle">متقدمة</text>

      <rect x="150" y="360" width="70" height="56" rx="10" fill="rgba(126,34,206,0.15)" stroke="rgba(192,132,252,0.25)" stroke-width="1"/>
      <text x="185" y="385" font-size="20" text-anchor="middle">📖</text>
      <text x="185" y="402" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">ورقة</text>
      <text x="185" y="412" font-size="7.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">منشورة</text>

      <rect x="230" y="360" width="70" height="56" rx="10" fill="rgba(126,34,206,0.12)" stroke="rgba(192,132,252,0.2)" stroke-width="1"/>
      <text x="265" y="385" font-size="20" text-anchor="middle">🔬</text>
      <text x="265" y="402" font-size="7.5" fill="rgba(255,255,255,0.4)" text-anchor="middle">بحث</text>
      <text x="265" y="412" font-size="7.5" fill="rgba(255,255,255,0.4)" text-anchor="middle">مكتمل</text>

      <rect x="310" y="360" width="70" height="56" rx="10" fill="rgba(126,34,206,0.1)" stroke="rgba(192,132,252,0.18)" stroke-width="1"/>
      <text x="345" y="385" font-size="20" text-anchor="middle">⚖️</text>
      <text x="345" y="402" font-size="7.5" fill="rgba(255,255,255,0.38)" text-anchor="middle">إرشاد</text>
      <text x="345" y="412" font-size="7.5" fill="rgba(255,255,255,0.38)" text-anchor="middle">قانوني</text>
    </g>
  </g>

  <!-- Bottom accent -->
  <rect x="55" y="452" width="693" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>