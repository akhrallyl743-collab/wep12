  <rect x="278" y="308" width="220" height="126" rx="14" fill="rgba(0,8,14,0.9)" stroke="rgba(56,189,248,0.3)" stroke-width="1.5"/>
  <text x="295" y="330" font-family="sans-serif" font-size="10" font-weight="700" fill="rgba(232,67,147,0.7)">💄 المكياج والتجميل</text>

  <g filter="url(#glow)">
    <!-- Color swatches -->
    <circle cx="310" cy="365" r="14" fill="#8b1a4a"/>
    <circle cx="338" cy="365" r="14" fill="#c2185b"/>
    <circle cx="366" cy="365" r="14" fill="#e84393"/>
    <circle cx="394" cy="365" r="14" fill="#ff80ab"/>
    <circle cx="422" cy="365" r="14" fill="#ffb7cf"/>
    <circle cx="450" cy="365" r="14" fill="rgba(255,183,207,0.3)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="450" y="370" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">+</text>
  </g>

  <g font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">
