<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00080e"/>
      <stop offset="55%" style="stop-color:#001525"/>
      <stop offset="100%" style="stop-color:#000e1a"/>
    </linearGradient>
    <radialGradient id="orb1" cx="65%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#0369a1;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="15%" cy="75%" r="40%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="progress-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#orb1)"/>
  <rect width="800" height="500" fill="url(#orb2)"/>

  <!-- Hex pattern background -->
  <g opacity="0.05" stroke="#38bdf8" stroke-width="1" fill="none">
    <polygon points="100,30 130,48 130,84 100,102 70,84 70,48"/>
    <polygon points="160,30 190,48 190,84 160,102 130,84 130,48"/>
    <polygon points="220,30 250,48 250,84 220,102 190,84 190,48"/>
    <polygon points="280,30 310,48 310,84 280,102 250,84 250,48"/>
    <polygon points="340,30 370,48 370,84 340,102 310,84 310,48"/>
    <polygon points="400,30 430,48 430,84 400,102 370,84 370,48"/>
    <polygon points="460,30 490,48 490,84 460,102 430,84 430,48"/>
    <polygon points="520,30 550,48 550,84 520,102 490,84 490,48"/>
    <polygon points="130,102 160,120 160,156 130,174 100,156 100,120"/>
    <polygon points="190,102 220,120 220,156 190,174 160,156 160,120"/>
    <polygon points="250,102 280,120 280,156 250,174 220,156 220,120"/>
    <polygon points="310,102 340,120 340,156 310,174 280,156 280,120"/>
  </g>

  <!-- Skill cards - main content -->
  <!-- Card 1: Fitness -->
  <rect x="55" y="60" width="205" height="170" rx="14" fill="rgba(0,8,14,0.9)" stroke="rgba(56,189,248,0.45)" stroke-width="1.5"/>
  <rect x="55" y="60" width="205" height="42" rx="14" fill="rgba(3,105,161,0.2)"/>
  <rect x="55" y="84" width="205" height="18" fill="rgba(3,105,161,0.1)"/>
  <text x="158" y="78" font-family="sans-serif" font-size="10" font-weight="700" fill="rgba(56,189,248,0.7)" text-anchor="middle">💪 اللياقة البدنية</text>

  <g filter="url(#glow)">
    <!-- Fitness progress rings -->
    <circle cx="108" cy="155" r="45" fill="none" stroke="rgba(56,189,248,0.15)" stroke-width="10"/>
    <circle cx="108" cy="155" r="45" fill="none" stroke="rgba(56,189,248,0.8)" stroke-width="10" stroke-dasharray="198 283" stroke-linecap="round" transform="rotate(-90 108 155)"/>
    <circle cx="108" cy="155" r="28" fill="none" stroke="rgba(3,105,161,0.2)" stroke-width="8"/>
    <circle cx="108" cy="155" r="28" fill="none" stroke="rgba(56,189,248,0.6)" stroke-width="8" stroke-dasharray="130 176" stroke-linecap="round" transform="rotate(-90 108 155)"/>
    <text x="108" y="150" font-family="sans-serif" font-size="11" font-weight="800" fill="#38bdf8" text-anchor="middle">70%</text>
    <text x="108" y="163" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">هدفك</text>
  </g>

  <g font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.55)">
    <text x="170" y="115">🔥 650 سعرة</text>
    <text x="170" y="132">⏱ 45 دقيقة</text>
    <text x="170" y="149">🏃 8.5 كم</text>
    <text x="170" y="166">💧 2.1 لتر</text>
    <text x="170" y="183">😴 7.5 ساعة</text>
    <text x="170" y="200">⚡ 12 تمرين</text>
  </g>

  <!-- Card 2: Cooking -->
  <rect x="55" y="244" width="205" height="190" rx="14" fill="rgba(0,8,14,0.9)" stroke="rgba(56,189,248,0.4)" stroke-width="1.5"/>
  <rect x="55" y="244" width="205" height="36" rx="14" fill="rgba(255,154,60,0.15)"/>
  <rect x="55" y="266" width="205" height="14" fill="rgba(255,154,60,0.08)"/>
  <text x="158" y="260" font-family="sans-serif" font-size="10" font-weight="700" fill="rgba(255,154,60,0.8)" text-anchor="middle">👨‍🍳 الطبخ والمأكولات</text>

  <g font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">
    <rect x="70" y="288" width="175" height="22" rx="6" fill="rgba(255,154,60,0.12)" stroke="rgba(255,154,60,0.3)" stroke-width="1"/>
    <text x="158" y="303" text-anchor="middle" font-weight="600">وصفة اليوم: بسطة إيطالية</text>

    <text x="70" y="325">🧄 ثوم — 3 فصوص</text>
    <text x="70" y="343">🍅 طماطم — 400 جم</text>
    <text x="70" y="361">🌿 ريحان طازج</text>
    <text x="70" y="379">🫙 زيت زيتون — 3 ملاعق</text>
