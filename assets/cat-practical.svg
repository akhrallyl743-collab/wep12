    <text x="295" y="415">الأدوات المطلوبة: فرش + منتجات</text>
    <text x="295" y="430" fill="rgba(56,189,248,0.5)">شاهد الدرس: 18 دقيقة ←</text>
  </g>

  <!-- Big right panel - stats -->
  <rect x="516" y="60" width="232" height="374" rx="14" fill="rgba(0,8,14,0.9)" stroke="rgba(56,189,248,0.4)" stroke-width="1.5"/>
  <text x="632" y="82" font-family="sans-serif" font-size="10" font-weight="700" fill="rgba(56,189,248,0.7)" text-anchor="middle">📊 تقدمك هذا الشهر</text>

  <g filter="url(#glow)">
    <!-- Big progress circle -->
    <circle cx="632" cy="180" r="80" fill="none" stroke="rgba(3,105,161,0.2)" stroke-width="14"/>
    <circle cx="632" cy="180" r="80" fill="none" stroke="rgba(56,189,248,0.85)" stroke-width="14" stroke-dasharray="352 503" stroke-linecap="round" transform="rotate(-90 632 180)"/>
    <circle cx="632" cy="180" r="60" fill="none" stroke="rgba(3,105,161,0.15)" stroke-width="10"/>
    <circle cx="632" cy="180" r="60" fill="none" stroke="rgba(3,105,161,0.7)" stroke-width="10" stroke-dasharray="245 377" stroke-linecap="round" transform="rotate(-90 632 180)"/>
    <text x="632" y="168" font-family="sans-serif" font-size="28" font-weight="900" fill="#38bdf8" text-anchor="middle">70%</text>
    <text x="632" y="186" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">مكتمل</text>
    <text x="632" y="200" font-family="sans-serif" font-size="9" fill="rgba(56,189,248,0.5)" text-anchor="middle">هذا الأسبوع</text>
  </g>

  <!-- Stats list -->
  <g font-family="sans-serif">
    <rect x="533" y="280" width="198" height="28" rx="7" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
    <text x="545" y="298" font-size="11" fill="rgba(255,255,255,0.6)">⏱ 42 ساعة تعلم</text>
    <text x="700" y="298" font-size="11" fill="#38bdf8" text-anchor="end">↑ +8h</text>

    <rect x="533" y="316" width="198" height="28" rx="7" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.15)" stroke-width="1"/>
    <text x="545" y="334" font-size="11" fill="rgba(255,255,255,0.55)">🏆 7 شهادات</text>
    <text x="700" y="334" font-size="11" fill="#ffd93d" text-anchor="end">جديدة</text>

    <rect x="533" y="352" width="198" height="28" rx="7" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
    <text x="545" y="370" font-size="11" fill="rgba(255,255,255,0.5)">🔥 21 يوم متواصل</text>

    <rect x="533" y="388" width="198" height="28" rx="7" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.12)" stroke-width="1"/>
    <text x="545" y="406" font-size="11" fill="rgba(255,255,255,0.5)">📚 5 مهارات عملية</text>
    <text x="700" y="406" font-size="11" fill="#1fbb85" text-anchor="end">✓</text>
  </g>

  <!-- Bottom accent -->
  <rect x="55" y="456" width="693" height="3" rx="1.5" fill="url(#accent)" opacity="0.55"/>
</svg>