    <text x="350" y="258">مصباح</text><text x="400" y="258">مقاومة</text><text x="450" y="258">مكثف</text>
  </g>

  <g font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">
    <text x="295" y="292">☀️ الطاقة الشمسية: الأساسيات</text>
  </g>

