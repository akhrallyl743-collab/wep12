  <rect x="278" y="60" width="220" height="110" rx="14" fill="rgba(0,8,14,0.9)" stroke="rgba(56,189,248,0.4)" stroke-width="1.5"/>
  <text x="295" y="82" font-family="sans-serif" font-size="10" font-weight="700" fill="rgba(56,189,248,0.7)">🪵 النجارة والديكور</text>

  <g font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">
