    <circle cx="350" cy="240" r="8" stroke="rgba(255,217,61,0.8)" fill="rgba(255,217,61,0.15)"/>
    <line x1="358" y1="240" x2="390" y2="240"/>
    <rect x="392" y="232" width="16" height="16" rx="2"/>
    <line x1="408" y1="240" x2="440" y2="240"/>
    <circle cx="450" cy="240" r="8" stroke="rgba(56,189,248,0.8)" fill="rgba(56,189,248,0.15)"/>
    <line x1="458" y1="240" x2="488" y2="240"/>
    <line x1="300" y1="240" x2="300" y2="270"/>
    <line x1="300" y1="270" x2="488" y2="270"/>
    <line x1="488" y1="240" x2="488" y2="270"/>
  </g>

