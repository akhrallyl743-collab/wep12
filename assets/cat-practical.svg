    <rect x="345" y="113" width="140" height="7" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="345" y="113" width="140" height="7" rx="3" fill="url(#progress-bar)"/>

    <text x="295" y="137">القطع</text>
