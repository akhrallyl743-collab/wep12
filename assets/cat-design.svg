<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#041410"/>
      <stop offset="55%" style="stop-color:#082820"/>
      <stop offset="100%" style="stop-color:#061a0f"/>
    </linearGradient>
    <radialGradient id="orb1" cx="65%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#0d8a5f;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0d8a5f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="20%" cy="75%" r="40%">
      <stop offset="0%" style="stop-color:#1fbb85;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1fbb85;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d8a5f"/>
      <stop offset="100%" style="stop-color:#1fbb85"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#orb1)"/>
  <rect width="800" height="500" fill="url(#orb2)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.08">
    <g fill="#1fbb85">
      <circle cx="80" cy="50" r="1.5"/><circle cx="160" cy="50" r="1.5"/><circle cx="240" cy="50" r="1.5"/><circle cx="320" cy="50" r="1.5"/><circle cx="400" cy="50" r="1.5"/><circle cx="480" cy="50" r="1.5"/><circle cx="560" cy="50" r="1.5"/><circle cx="640" cy="50" r="1.5"/><circle cx="720" cy="50" r="1.5"/>
      <circle cx="80" cy="130" r="1.5"/><circle cx="160" cy="130" r="1.5"/><circle cx="240" cy="130" r="1.5"/><circle cx="320" cy="130" r="1.5"/><circle cx="400" cy="130" r="1.5"/><circle cx="480" cy="130" r="1.5"/><circle cx="560" cy="130" r="1.5"/><circle cx="640" cy="130" r="1.5"/><circle cx="720" cy="130" r="1.5"/>
      <circle cx="80" cy="210" r="1.5"/><circle cx="160" cy="210" r="1.5"/><circle cx="240" cy="210" r="1.5"/><circle cx="320" cy="210" r="1.5"/><circle cx="400" cy="210" r="1.5"/><circle cx="480" cy="210" r="1.5"/><circle cx="560" cy="210" r="1.5"/><circle cx="640" cy="210" r="1.5"/><circle cx="720" cy="210" r="1.5"/>
      <circle cx="80" cy="290" r="1.5"/><circle cx="160" cy="290" r="1.5"/><circle cx="240" cy="290" r="1.5"/><circle cx="320" cy="290" r="1.5"/><circle cx="400" cy="290" r="1.5"/><circle cx="480" cy="290" r="1.5"/><circle cx="560" cy="290" r="1.5"/><circle cx="640" cy="290" r="1.5"/><circle cx="720" cy="290" r="1.5"/>
      <circle cx="80" cy="370" r="1.5"/><circle cx="160" cy="370" r="1.5"/><circle cx="240" cy="370" r="1.5"/><circle cx="320" cy="370" r="1.5"/><circle cx="400" cy="370" r="1.5"/><circle cx="480" cy="370" r="1.5"/><circle cx="560" cy="370" r="1.5"/><circle cx="640" cy="370" r="1.5"/><circle cx="720" cy="370" r="1.5"/>
      <circle cx="80" cy="450" r="1.5"/><circle cx="160" cy="450" r="1.5"/><circle cx="240" cy="450" r="1.5"/><circle cx="320" cy="450" r="1.5"/><circle cx="400" cy="450" r="1.5"/><circle cx="480" cy="450" r="1.5"/><circle cx="560" cy="450" r="1.5"/><circle cx="640" cy="450" r="1.5"/><circle cx="720" cy="450" r="1.5"/>
    </g>
  </g>

  <!-- Main design frame -->
  <rect x="55" y="60" width="440" height="350" rx="16" fill="rgba(4,20,16,0.88)" stroke="rgba(13,138,95,0.5)" stroke-width="1.5"/>
  <!-- Titlebar -->
  <rect x="55" y="60" width="440" height="36" rx="16" fill="rgba(13,138,95,0.15)"/>
  <rect x="55" y="78" width="440" height="18" fill="rgba(13,138,95,0.08)"/>
  <circle cx="81" cy="78" r="5.5" fill="#ff5f57" opacity="0.9"/>
  <circle cx="99" cy="78" r="5.5" fill="#febc2e" opacity="0.9"/>
  <circle cx="117" cy="78" r="5.5" fill="#28c840" opacity="0.9"/>
  <!-- Tool icons in titlebar -->
  <text x="380" y="83" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Figma • Illustrator • Photoshop</text>

  <!-- Left panel - layers -->
  <rect x="55" y="96" width="90" height="314" fill="rgba(2,12,8,0.7)" stroke="rgba(13,138,95,0.2)" stroke-width="1"/>
  <text x="100" y="115" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">LAYERS</text>
  <g opacity="0.6" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">
    <rect x="62" y="122" width="76" height="18" rx="3" fill="rgba(13,138,95,0.3)"/>
    <text x="100" y="134">📦 Header</text>
    <text x="100" y="155">📦 Hero</text>
    <text x="100" y="173">  📷 Image</text>
    <text x="100" y="191">  ✏️ Title</text>
    <text x="100" y="209">📦 Cards</text>
    <text x="100" y="227">  🔲 Card 1</text>
    <text x="100" y="245">  🔲 Card 2</text>
    <text x="100" y="263">📦 Footer</text>
    <text x="100" y="281">  ✏️ Links</text>
  </g>

  <!-- Main canvas area -->
  <rect x="148" y="96" width="347" height="314" fill="rgba(255,255,255,0.04)"/>

  <!-- Design mockup on canvas -->
  <!-- UI Card 1 -->
  <rect x="165" y="112" width="150" height="110" rx="10" fill="rgba(13,138,95,0.12)" stroke="rgba(13,138,95,0.4)" stroke-width="1.5"/>
  <rect x="165" y="112" width="150" height="38" rx="10" fill="rgba(13,138,95,0.2)"/>
  <rect x="165" y="135" width="150" height="15" fill="rgba(13,138,95,0.12)"/>
  <rect x="175" y="118" width="40" height="18" rx="9" fill="rgba(31,187,133,0.5)"/>
  <text x="195" y="131" font-family="sans-serif" font-size="8" fill="white" font-weight="700" text-anchor="middle">Design</text>
  <rect x="175" y="158" width="100" height="8" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="175" y="172" width="75" height="6" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="175" y="184" width="85" height="6" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="175" y="198" width="50" height="16" rx="8" fill="rgba(13,138,95,0.6)"/>
  <text x="200" y="210" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">View →</text>

  <!-- UI Card 2 -->
  <rect x="328" y="112" width="150" height="110" rx="10" fill="rgba(255,107,107,0.08)" stroke="rgba(255,107,107,0.3)" stroke-width="1.5"/>
  <rect x="338" y="120" width="70" height="40" rx="6" fill="rgba(255,107,107,0.15)"/>
  <text x="373" y="145" font-family="sans-serif" font-size="22" text-anchor="middle">🎨</text>
  <rect x="338" y="167" width="100" height="8" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="338" y="181" width="75" height="6" rx="2" fill="rgba(255,255,255,0.07)"/>
  <rect x="338" y="198" width="50" height="16" rx="8" fill="rgba(255,107,107,0.4)"/>

  <!-- Color palette row -->
  <rect x="165" y="238" width="313" height="52" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(13,138,95,0.2)" stroke-width="1"/>
  <text x="180" y="253" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.4)">COLOR PALETTE</text>
  <rect x="175" y="258" width="35" height="22" rx="5" fill="#ff6b6b"/>
  <rect x="218" y="258" width="35" height="22" rx="5" fill="#ffd93d"/>
  <rect x="261" y="258" width="35" height="22" rx="5" fill="#1fbb85"/>
  <rect x="304" y="258" width="35" height="22" rx="5" fill="#4d96ff"/>
  <rect x="347" y="258" width="35" height="22" rx="5" fill="#c77dff"/>
  <rect x="390" y="258" width="35" height="22" rx="5" fill="#ff9a3c"/>
  <rect x="433" y="258" width="22" height="22" rx="5" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="444" y="273" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">+</text>

  <!-- Typography section -->
  <rect x="165" y="305" width="313" height="90" rx="8" fill="rgba(0,0,0,0.2)" stroke="rgba(13,138,95,0.15)" stroke-width="1"/>
  <text x="180" y="320" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.35)">TYPOGRAPHY</text>
  <text x="180" y="340" font-family="serif" font-size="18" fill="rgba(31,187,133,0.9)" font-weight="bold">Aa Design</text>
  <text x="180" y="358" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Regular • Bold • Italic</text>
  <text x="180" y="375" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)">16px / 24px line height</text>

  <!-- Right side - tools -->
  <g filter="url(#glow)">
    <!-- Figma-like shapes -->
    <circle cx="650" cy="120" r="40" fill="rgba(13,138,95,0.18)" stroke="rgba(31,187,133,0.5)" stroke-width="2"/>
    <circle cx="650" cy="120" r="25" fill="rgba(13,138,95,0.25)" stroke="rgba(31,187,133,0.4)" stroke-width="1.5"/>
    <circle cx="650" cy="120" r="12" fill="rgba(31,187,133,0.5)"/>
    <text x="650" y="126" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">F</text>

    <rect x="615" y="185" width="70" height="70" rx="8" fill="rgba(13,138,95,0.15)" stroke="rgba(31,187,133,0.35)" stroke-width="1.5" transform="rotate(15 650 220)"/>
    <rect x="625" y="195" width="50" height="50" rx="6" fill="rgba(31,187,133,0.2)" transform="rotate(15 650 220)"/>

    <!-- Pen tool -->
    <g transform="translate(610,290)" opacity="0.7">
      <polygon points="20,0 0,35 40,35" fill="none" stroke="#1fbb85" stroke-width="2.5"/>
      <circle cx="20" cy="35" r="5" fill="#1fbb85"/>
      <line x1="20" y1="35" x2="20" y2="55" stroke="#1fbb85" stroke-width="2"/>
    </g>

    <!-- Color wheel -->
    <circle cx="690" cy="390" r="55" fill="none" stroke="rgba(255,107,107,0.5)" stroke-width="22" stroke-dasharray="58 345" stroke-dashoffset="0"/>
    <circle cx="690" cy="390" r="55" fill="none" stroke="rgba(255,217,61,0.5)" stroke-width="22" stroke-dasharray="58 345" stroke-dashoffset="-58"/>
    <circle cx="690" cy="390" r="55" fill="none" stroke="rgba(107,203,119,0.5)" stroke-width="22" stroke-dasharray="58 345" stroke-dashoffset="-116"/>
    <circle cx="690" cy="390" r="55" fill="none" stroke="rgba(77,150,255,0.5)" stroke-width="22" stroke-dasharray="58 345" stroke-dashoffset="-174"/>
    <circle cx="690" cy="390" r="55" fill="none" stroke="rgba(199,125,255,0.5)" stroke-width="22" stroke-dasharray="58 345" stroke-dashoffset="-232"/>
    <circle cx="690" cy="390" r="55" fill="none" stroke="rgba(255,154,60,0.5)" stroke-width="22" stroke-dasharray="58 345" stroke-dashoffset="-290"/>
    <circle cx="690" cy="390" r="34" fill="rgba(4,20,16,0.95)"/>
    <text x="690" y="396" font-family="sans-serif" font-size="16" fill="rgba(31,187,133,0.7)" text-anchor="middle">✦</text>
  </g>

  <!-- Bottom accent -->
  <rect x="55" y="433" width="440" height="3" rx="1.5" fill="url(#accent)" opacity="0.65"/>
</svg>